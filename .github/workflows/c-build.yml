name: C build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Install static glibc
      run: |
        sudo apt-get update
        sudo apt-get install -y libc6-dev
    - name: Build
      run: make -C src
    - name: Run tests
      run: sh tests/run.sh
