name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install static glibc
      run: |
        sudo apt-get update
        sudo apt-get install -y libc6-dev
    - name: Build
      run: make -C src
    - name: Smoke test
      run: |
        ! ./src/systemd-sandbox-check --unit /nonexistent.service --dry-run
        cat > /tmp/example.service <<'EOF'
        [Service]
        ExecStart=/bin/true
        NoNewPrivileges=true
        ProtectSystem=strict
        EOF
        ./src/systemd-sandbox-check --unit /tmp/example.service --dry-run | grep -q systemd-run
    - name: Package
      run: cp src/systemd-sandbox-check systemd-sandbox-check-linux-x86_64
    - name: Create release
      uses: softprops/action-gh-release@v3
      with:
        files: systemd-sandbox-check-linux-x86_64
        generate_release_notes: true
