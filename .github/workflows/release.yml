name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Install static glibc
      run: |
        sudo apt-get update
        sudo apt-get install -y libc6-dev
    - name: Build
      run: make -C src
    - name: Run tests
      run: sh tests/run.sh
    - name: Package
      run: cp src/systemd-sandbox-check systemd-sandbox-check-linux-x86_64
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: systemd-sandbox-check-linux-x86_64
        generate_release_notes: true
